name: bank
description: A compact core-banking system with core, customer, payment, reward, risk, loan, and wealth services
version: 0.4.0
databases:
  - name: core_db
    migrate: db/migrations/core_db.sql
  - name: cust_db
    migrate: db/migrations/cust_db.sql
  - name: pay_db
    migrate: db/migrations/pay_db.sql
  - name: reward_db
    migrate: db/migrations/reward_db.sql
  - name: risk_db
    migrate: db/migrations/risk_db.sql
  - name: loan_db
    migrate: db/migrations/loan_db.sql
  - name: wealth_db
    migrate: db/migrations/wealth_db.sql
services:
  - {name: core-banking, port: 18080, db: core_db}
  - {name: customer, port: 18081, db: cust_db}
  - {name: payment, port: 18082, db: pay_db}
  - {name: reward, port: 18083, db: reward_db}
  - {name: risk, port: 18084, db: risk_db}
  - {name: loan, port: 18085, db: loan_db}
  - {name: wealth, port: 18086, db: wealth_db}
seed:
  entrypoint: go run ./cmd/seed
  scales: [dev, full]
