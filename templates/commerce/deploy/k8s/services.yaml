# ClusterIP services for the six Go apps and the infrastructure they talk to.
#
# Per compose.yaml, Traefik is the only externally-reachable entrypoint. Here
# we mirror that with a single Ingress (gateway.yaml) — no Service is published
# outside the cluster. App Services are plain ClusterIP so the Ingress
# controller and intra-cluster callers (order -> customer/catalog/inventory,
# fulfillment -> inventory) can resolve them by DNS name.
#
# Session affinity is OFF on every Service. compose's Traefik load-balancer
# uses round-robin and exposes the per-instance ID via the
# X-Service-Instance response header (see smoke.sh gate 1). To verify the same
# in k8s, the Ingress must round-robin across the Service endpoints — the
# default for kube-proxy in ipvs/iptables mode.

apiVersion: v1
kind: Service
metadata:
  name: catalog
  namespace: commerce
  labels:
    app.kubernetes.io/name: commerce
    app.kubernetes.io/part-of: commerce
    app.kubernetes.io/component: catalog
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: commerce
    app.kubernetes.io/component: catalog
  ports:
    - name: http
      port: 8080
      targetPort: http

