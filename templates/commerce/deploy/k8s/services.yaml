# ---------------------------------------------------------------------------
# Infrastructure DNS aliases.
#
# These Services exist ONLY so the in-cluster app Pods can resolve the same
# DNS names compose.yaml uses (catalog-db, customer-db, ..., rabbitmq) without
# editing the ConfigMaps. They are not the database itself — they point at
# whatever StatefulSet / external-name you wire up in your cluster. The
# ExternalName form is the lightest way to make this work on a fresh dev
# cluster where Postgres/RabbitMQ live outside the namespace (e.g. host
# accessor on kind, or a separately-installed operator release).
#
# For dev we point them at the typical docker-compose hostnames reachable via
# the cluster's DNS search list. Override these to your real endpoints (RDS,
# CloudSQL, operator-managed StatefulSet Service, etc.) before non-dev use.
#
# NO HA CLAIM: each ExternalName resolves to a single endpoint, mirroring the
# single-replica Postgres / RabbitMQ containers in compose.yaml.

---
apiVersion: v1
kind: Service
metadata:
  name: catalog-db
  namespace: commerce
  labels:
    app.kubernetes.io/name: commerce
    app.kubernetes.io/part-of: commerce
    app.kubernetes.io/component: catalog-db
spec:
  type: ExternalName
  externalName: catalog-db.default.svc.cluster.local

