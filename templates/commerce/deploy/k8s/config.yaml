# Shared configuration and the dev-only secret.
#
# `commerce-shared` mirrors the `x-service-env` anchor in `compose.yaml` —
# every service mounts it via `envFrom`. The per-service ConfigMaps below add
# only the keys each service actually consumes (DB_HOST / DB_NAME / INSTANCE_ID
# / downstream SERVICE_URLs); they override keys from the shared ConfigMap via
# kubectl's standard "last envFrom entry wins" rule, so the per-service
# ConfigMap must be listed AFTER the shared one in each Deployment.
#
# SECRET HANDLING: `commerce-dev-secret` carries the plaintext compose
# credentials (commerce/commerce). It exists so `kubectl apply -k` works out of
# the box on a fresh dev cluster. It is labeled unsafe for any non-dev use —
# replace with an external secret before pointing real traffic at this
# namespace.

apiVersion: v1
kind: ConfigMap
metadata:
  name: commerce-shared
  namespace: commerce
  labels:
    app.kubernetes.io/name: commerce
    app.kubernetes.io/part-of: commerce
data:
  # Mirrors compose.yaml x-service-env. DB_HOST/DB_NAME/INSTANCE_ID are
  # intentionally omitted here so the per-service ConfigMap can supply the
  # right value for each Deployment.
  DB_PORT: "5432"
  DB_USER: commerce
  DB_SSLMODE: disable
  DB_MAX_CONNS: "10"
  DB_MIN_CONNS: "1"
  HTTP_ADDR: ":8080"
  CLIENT_REQUEST_TIMEOUT: 8s
  CLIENT_ATTEMPT_TIMEOUT: 3s
  OUTBOX_BATCH_SIZE: "100"
  OUTBOX_POLL_INTERVAL: 1s
  SHUTDOWN_TIMEOUT: 25s
  # BROKER_URL lives in the Secret (password component).

---
# Per-service overrides. catalog/customer/inventory/payment/fulfillment have
# no downstream HTTP peers; order talks to customer/catalog/inventory and
# fulfillment talks to inventory (mirroring the compose `environment:` blocks).

apiVersion: v1
kind: ConfigMap
metadata:
  name: catalog-env
  namespace: commerce
  labels:
    app.kubernetes.io/name: commerce
    app.kubernetes.io/part-of: commerce
    app.kubernetes.io/component: catalog
data:
  SERVICE: catalog
  DB_HOST: catalog-db
  DB_NAME: catalog
  INSTANCE_ID: k8s-catalog

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: customer-env
  namespace: commerce
  labels:
    app.kubernetes.io/name: commerce
    app.kubernetes.io/part-of: commerce
    app.kubernetes.io/component: customer
data:
  SERVICE: customer
  DB_HOST: customer-db
  DB_NAME: customer
  INSTANCE_ID: k8s-customer

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: inventory-env
  namespace: commerce
  labels:
    app.kubernetes.io/name: commerce
    app.kubernetes.io/part-of: commerce
    app.kubernetes.io/component: inventory
data:
  SERVICE: inventory
  DB_HOST: inventory-db
  DB_NAME: inventory
  INSTANCE_ID: k8s-inventory

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-env
  namespace: commerce
  labels:
    app.kubernetes.io/name: commerce
    app.kubernetes.io/part-of: commerce
    app.kubernetes.io/component: order
data:
  SERVICE: order
  DB_HOST: order-db
  DB_NAME: order
  INSTANCE_ID: k8s-order
  # Mirror compose.yaml: order validates against the customer/catalog/
  # inventory services over HTTP. The Service DNS names are the k8s ClusterIP
  # services in services.yaml.
  CUSTOMER_URL: http://customer:8080
  CATALOG_URL: http://catalog:8080
  INVENTORY_URL: http://inventory:8080

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-env
  namespace: commerce
  labels:
    app.kubernetes.io/name: commerce
    app.kubernetes.io/part-of: commerce
    app.kubernetes.io/component: payment
data:
  SERVICE: payment
  DB_HOST: payment-db
  DB_NAME: payment
  INSTANCE_ID: k8s-payment

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fulfillment-env
  namespace: commerce
  labels:
    app.kubernetes.io/name: commerce
    app.kubernetes.io/part-of: commerce
    app.kubernetes.io/component: fulfillment
data:
  SERVICE: fulfillment
  DB_HOST: fulfillment-db
  DB_NAME: fulfillment
  INSTANCE_ID: k8s-fulfillment
  # Mirror compose.yaml: fulfillment releases reservations via inventory.
  INVENTORY_URL: http://inventory:8080

---
# DEV-ONLY SECRET. Plaintext value mirrors `compose.yaml`. The
# commerce.jiade/unsafe label exists so a policy engine (Kyverno / OPA /
# admission webhook) can reject this Secret from any namespace that is not
# explicitly marked dev. Replace with an externally-managed secret
# (Sealed Secrets / External Secrets / Vault) before any non-dev use.
#
# The two keys are the only secret-shaped values the services read (DB_PASSWORD
# for PostgreSQL and the credentials embedded in BROKER_URL for RabbitMQ).

apiVersion: v1
kind: Secret
metadata:
  name: commerce-dev-secret
  namespace: commerce
  labels:
    app.kubernetes.io/name: commerce
    app.kubernetes.io/part-of: commerce
    commerce.jiade/unsafe: dev-only
  annotations:
    commerce.jiade/unsafe-reason: "plaintext dev credentials mirror compose.yaml; replace before any non-dev use"
type: Opaque
stringData:
  DB_PASSWORD: commerce
  BROKER_URL: amqp://commerce:commerce@rabbitmq:5672/
